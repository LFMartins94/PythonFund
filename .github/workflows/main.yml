name: Pipeline CI/CD

on:
 push:
   branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    step:
      - users: actions/checkout@v3
      - name: Setup Node
        uses: action/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run test

    deploy:
       needs: build
       runs-on: ubuntu-latest
       steps:
         - name: Deploy (simulado)
           run: echo "Deploy realizado com sucesso"

name: Pipeline Node e Python
on:
  push:
    branches: [ "master" ]

jobs:
  execucao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Certifique-se que está USES e não USERS
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Instalar e Rodar Node
        run: |
          npm install
          node index.js

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Testar scripts Python
        run: python -m compileall .
